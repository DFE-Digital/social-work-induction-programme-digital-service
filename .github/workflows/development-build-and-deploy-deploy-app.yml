name: Development build & deploy deploy app

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Azure deployment environment"
        required: true
        default: Dev
        type: choice
        options:
          - Dev
          - Test

jobs:
  create-and-publish-image:
    name: Build & Deploy Deploy App
    uses: ./.github/workflows/development-build-and-deploy-template.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      docker-build-file: ./deploy-app-docker/Dockerfile
      short-image-name: deploy-app
      web-app-name: webapp-deploy
